services:
  web:
    build:
      context: .
      dockerfile: dockerfile.test
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: clonebox
      DB_USER: web
    secrets:
      - db_password
    ports:
      - "127.0.0.1:2345:2345"
      - "127.0.0.1:4000:4000"
    volumes:
      - web_fileShare:/clonebox/uploads
    security_opt:
      - "seccomp:unconfined"
      - "label=disable"
    cap_add:
      - SYS_PTRACE
    command: ["/go/bin/dlv", "exec", "/app/web", "--headless", "--listen=:2345", "--api-version=2", "--accept-multiclient", "--continue", "--", "-debug"]