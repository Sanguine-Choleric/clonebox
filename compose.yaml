services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: snippetbox
      DB_USER: web
    secrets:
      - db_password
      - web_llm_api_key
    volumes:
      - web_fileShare:/clonebox/uploads
    networks:
      - default

  db:
    image: mariadb:lts-ubi9
    environment:
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MARIADB_USER: web
      MARIADB_PASSWORD_FILE: /run/secrets/db_password
      MARIADB_DATABASE: snippetbox
      MARIADB_LOG_WARNINGS: 0
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping --silent"]
      interval: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./compose/sql/:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    ports:
      - "127.0.0.1:3306:3306"
    networks:
      - default

  proxy:
    image: caddy:2.9
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./compose/caddy:/etc/caddy/
    networks:
      - default

secrets:
  db_password:
    file: ./compose/secrets/db_password
  db_root_password:
    file: ./compose/secrets/db_root_password
  web_llm_api_key:
    file: ./compose/secrets/web_llm_api_key

volumes:
  db_data:
  web_fileShare:

networks:
  default:
    enable_ipv6: true