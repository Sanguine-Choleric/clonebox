services:
  web:
    build:
      context: .
      dockerfile: dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_NAME: clonebox
      DB_USER: web
    secrets:
      - db_password
      - web_llm_api_key
    volumes:
      - web_fileShare:/clonebox/uploads
    networks:
      - default

